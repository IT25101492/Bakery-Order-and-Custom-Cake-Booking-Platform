# ===============================
# DATABASE CONNECTION (H2 Development / MySQL Production)
# ===============================
# Development: Uses in-memory H2 database (no MySQL needed)
spring.datasource.url=jdbc:h2:mem:bakery_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# Automatically create and drop tables for each session (dev mode)
spring.jpa.hibernate.ddl-auto=create-drop
# Show SQL for debugging
spring.jpa.show-sql=true
# Format SQL output
spring.jpa.properties.hibernate.format_sql=true
# Use H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===============================
# H2 CONSOLE (Optional - for viewing in-memory database)
# ===============================
# Enable H2 console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# SERVER CONFIGURATION
# ===============================
# The port where your application will run (default is 8080)[cite: 1]
server.port=8080

# ===============================
# JSP VIEW RESOLVER
# ===============================
# This tells Spring to look in your new folder structure
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp