# ===============================
# DATABASE CONNECTION (MySQL)
# ===============================
# Replace 'bakery_db' with the schema name you created in MySQL Workbench
spring.datasource.url=jdbc:mysql://localhost:3306/bakery_db?useSSL=false&serverTimezone=UTC
# Your MySQL Workbench username (usually 'root')
spring.datasource.username=root
# Your MySQL Workbench password[cite: 1]
spring.datasource.password=1234

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# 'update' will automatically create your tables (orders, standard_order, etc.) based on your Java classes[cite: 1]
spring.jpa.hibernate.ddl-auto=update
# This allows you to see the SQL commands in the VS Code terminal for debugging[cite: 1]
spring.jpa.show-sql=true
# Formats the SQL in the terminal to be more readable
spring.jpa.properties.hibernate.format_sql=true
# Specifies the MySQL dialect for Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# SERVER CONFIGURATION
# ===============================
# The port where your application will run (default is 8080)[cite: 1]
server.port=8080

# ===============================
# JSP VIEW RESOLVER
# ===============================
# This tells Spring to look in your new folder structure
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp